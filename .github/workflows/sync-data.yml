name: sync-data

on:
  schedule:
    # 每周一 02:00 UTC（北京时间 10:00）
    - cron: '0 2 * * 0'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: scripts/requirements.txt

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Verify Supabase credentials
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          if [ -z "$SUPABASE_URL" ] || [ -z "$SUPABASE_SERVICE_ROLE_KEY" ]; then
            echo "::error::SUPABASE_URL or SUPABASE_SERVICE_ROLE_KEY not set in GitHub Secrets"
            echo "Go to: Settings → Secrets and variables → Actions → New repository secret"
            exit 1
          fi
          echo "Supabase URL: ${SUPABASE_URL:0:40}..."
          echo "Service key prefix: ${SUPABASE_SERVICE_ROLE_KEY:0:10}..."

      - name: Test Supabase REST API connection
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          echo "Testing Supabase REST API..."
          HTTP_CODE=$(curl -s -o /tmp/sb_test.json -w "%{http_code}" \
            -H "apikey: $SUPABASE_SERVICE_ROLE_KEY" \
            -H "Authorization: Bearer $SUPABASE_SERVICE_ROLE_KEY" \
            "${SUPABASE_URL}/rest/v1/dramas?select=id&limit=1")
          echo "HTTP status: $HTTP_CODE"
          echo "Response: $(cat /tmp/sb_test.json | head -c 500)"
          if [ "$HTTP_CODE" -ge 400 ]; then
            echo "::error::Supabase REST API returned HTTP $HTTP_CODE"
            echo "Possible causes:"
            echo "  1. SUPABASE_URL is incorrect (should be like https://xxxx.supabase.co)"
            echo "  2. SUPABASE_SERVICE_ROLE_KEY is incorrect or is the anon key"
            echo "  3. Tables not created yet (run schema.sql in Supabase SQL Editor)"
            exit 1
          fi
          echo "Connection OK!"

      - name: Dry run (verify data)
        run: python scripts/crawler_main.py --dry-run --skip-crawl

      - name: Sync data to Supabase
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: python scripts/crawler_main.py --skip-crawl --verbose

      - name: Trigger Vercel deploy
        env:
          VERCEL_DEPLOY_HOOK: ${{ secrets.VERCEL_DEPLOY_HOOK }}
        run: |
          if [ -n "$VERCEL_DEPLOY_HOOK" ]; then
            echo "Triggering Vercel deploy..."
            curl -fsSL -X POST "$VERCEL_DEPLOY_HOOK" || echo "Warning: Deploy hook call failed"
          else
            echo "VERCEL_DEPLOY_HOOK not set, skipping"
          fi
